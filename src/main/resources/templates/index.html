<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }
        .navbar { background: #343a40; }
        .navbar-brand { color: white !important; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="container-fluid">
        <span class="navbar-brand">Student Management System vadalur</span>
    </div>
</nav>

<div class="container mt-4">

    <h4>Total Students: <span th:text="${#lists.size(students)}"></span></h4>

    <button class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#addModal">
        Add Student
    </button>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="s : ${students}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.email}"></td>
                <td th:text="${s.course}"></td>
                <td>
                    <a th:href="@{/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

<!-- ADD MODAL -->
<div class="modal fade" id="addModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <form action="/save" method="post">
                <div class="modal-header">
                    <h5>Add Student</h5>
                </div>

                <div class="modal-body">
                    <input name="name" class="form-control mb-2" placeholder="Name" required>
                    <input name="email" class="form-control mb-2" placeholder="Email" required>
                    <input name="course" class="form-control" placeholder="Course" required>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- CHAT BOX -->
<div style="
    position: fixed;
    bottom: 0;
    right: 0;
    width: 400px;
    height: 500px;
    background: #f8f9fa;
    border-left: 2px solid #ccc;
    display: flex;
    flex-direction: column;
">

    <div style="background:#343a40;color:white;padding:10px;">
        🤖 AI Assistant
    </div>

    <div id="chatBox" style="
        flex:1;
        overflow-y:auto;
        padding:10px;
    "></div>

    <div style="display:flex;">
        <input id="userInput" style="flex:1;padding:10px;border:none;" placeholder="Type message...">
        <button onclick="sendMessage()" style="padding:10px;background:#007bff;color:white;border:none;">
            Send
        </button>
    </div>

</div>

<script>
function sendMessage() {
    let msg = document.getElementById("userInput").value;
    let chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
    <div style="text-align:right;margin:5px;">
        <span style="background:#007bff;color:white;padding:8px;border-radius:10px;">
            ${msg}
        </span>
    </div>`;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "message=" + msg
    })
    .then(res => res.text())
    .then(data => {
        chatBox.innerHTML += `
        <div style="text-align:left;margin:5px;">
            <span style="background:#e9ecef;padding:8px;border-radius:10px;">
                ${data}
            </span>
        </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    document.getElementById("userInput").value = "";
}
</script>
</body>
</html>
