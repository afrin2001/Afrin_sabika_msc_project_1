<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .navbar {
            background: #343a40;
        }
        .navbar-brand {
            color: white !important;
        }
        .card {
            border-radius: 10px;
        }
        .btn-custom {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Student Management System</span>
    </div>
</nav>

<div class="container mt-4">

    <!-- DASHBOARD -->
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h5>Total Students</h5>
                <h2 th:text="${#lists.size(students)}"></h2>
            </div>
        </div>
    </div>

    <!-- ADD BUTTON -->
    <div class="mt-4">
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">
            Add Student
        </button>
    </div>

    <!-- TABLE -->
    <div class="mt-3">
        <table class="table table-bordered table-hover shadow">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.course}"></td>
                    <td>
                        <a th:href="@{/delete/{id}(id=${s.id})}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- ADD STUDENT MODAL -->
<div class="modal fade" id="addModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Add Student</h5>
            </div>

            <form action="/save" method="post">
                <div class="modal-body">

                    <input type="text" name="name" class="form-control mb-2" placeholder="Name" required>
                    <input type="text" name="email" class="form-control mb-2" placeholder="Email" required>
                    <input type="text" name="course" class="form-control" placeholder="Course" required>

                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
